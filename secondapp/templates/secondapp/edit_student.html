{% extends 'secondapp/base.html' %}

{% block title %}Edit Student{% endblock %}

{% block content %}

    <h2>Edit Student</h2>

    <form method="POST" novalidate>
        {% csrf_token %}

        {% for field in form %}
            <p>
                {{ field.label_tag }}
                {{ field }}
                {% if field.errors %}
                    <p style="color:red;">{{ field.errors.as_text }}</p>
                {% endif %}
            </p>
        {% endfor %}

        <button type="submit">Save Changes</button>
    </form>

{% endblock %}
